<!DOCTYPE html>
<html lang="vi">
<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xem phim - MiloxZizi Film</title>
  <script>window.__CB="?v="+Date.now();document.write('<link rel="stylesheet" href="css/style.css'+window.__CB+'">');</script>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  <style>
    :root {
      --plyr-color-main: #e50914;
      --plyr-video-background: #000;
      --plyr-menu-background: rgba(20, 20, 20, 0.95);
      --plyr-menu-color: #fff;
      --plyr-tooltip-background: rgba(20, 20, 20, 0.95);
      --plyr-tooltip-color: #fff;
      --plyr-video-control-color: #fff;
      --plyr-video-control-color-hover: #e50914;
      --plyr-range-fill-background: #e50914;
      --plyr-range-thumb-background: #e50914;
      --plyr-control-radius: 6px;
    }
    .plyr { border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    .plyr__menu__container { backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .plyr__control--overlaid { background: var(--plyr-color-main); box-shadow: 0 4px 20px rgba(229, 9, 20, 0.5); }
    .plyr__control--overlaid:hover { background: #f40612; }
    .plyr__control { padding: 8px !important; }
    .plyr--video .plyr__control svg { width: 20px; height: 20px; }
    @media (max-width: 720px) {
      .plyr__control { padding: 10px !important; }
      .plyr--video .plyr__control svg { width: 22px; height: 22px; }
    }
    .player-container { max-width: 1200px; margin: 0 auto 28px; animation: fadeInUp 0.6s ease-out; position: relative; }

    /* ============ SEEK INDICATORS - chỉ hiển thị, KHÔNG bắt click ============ */
    /* Overlay này HOÀN TOÀN trong suốt với mọi sự kiện chuột/touch */
    .seek-overlay {
      position: absolute; top: 0; left: 0; right: 0;
      height: calc(100% - 70px);
      pointer-events: none; /* QUAN TRỌNG: không bao giờ chặn click */
      z-index: 4;
      display: flex;
    }
    .seek-zone-display {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .seek-zone-display.center { flex: 0.5; }

    .seek-indicator {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; font-weight: 700;
      opacity: 0; transform: scale(0.6);
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
      border: 2px solid rgba(255, 255, 255, 0.2);
    }
    .seek-indicator .arrows { font-size: 26px; line-height: 1; letter-spacing: -3px; margin-bottom: 6px; color: #fff; }
    .seek-indicator .number { font-size: 18px; line-height: 1; font-weight: 800; }
    .seek-indicator.show { opacity: 1; transform: scale(1); }
    @media (max-width: 720px) {
      .seek-indicator { width: 84px; height: 84px; }
      .seek-indicator .arrows { font-size: 22px; }
      .seek-indicator .number { font-size: 15px; }
    }

    .video-info-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--bg-secondary); border-radius: 10px; margin-top: 16px; flex-wrap: wrap; gap: 12px; }
    .video-info-bar .title-group h1 { font-size: 22px; margin: 0 0 4px; }
    .video-info-bar .title-group .ep { color: var(--text-secondary); font-size: 14px; }
    .video-info-bar .title-group .ep strong { color: var(--accent); }
    .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .quick-actions button { padding: 10px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); cursor: pointer; font-size: 13px; transition: all 0.2s; display: flex; align-items: center; gap: 6px; min-height: 44px; font-weight: 500; }
    .quick-actions button:hover { background: var(--accent); border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 16px var(--accent-glow); }
    @media (max-width: 720px) {
      .video-info-bar { padding: 14px; flex-direction: column; align-items: stretch; }
      .video-info-bar .title-group { text-align: center; }
      .video-info-bar .title-group h1 { font-size: 18px; }
      .quick-actions { justify-content: center; }
      .quick-actions button { flex: 1; min-width: 100px; justify-content: center; padding: 12px 8px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>
  <main>
    <div id="watchContent">
      <div class="loading"><div class="spinner"></div><p style="margin-top:12px;">Đang tải phim...</p></div>
    </div>
  </main>
  <div id="footer-container"></div>
  <script>document.write('<scr'+'ipt src="js/api.js'+window.__CB+'"><\/scr'+'ipt>');</script>
  <script>document.write('<scr'+'ipt src="js/storage.js'+window.__CB+'"><\/scr'+'ipt>');</script>
  <script>document.write('<scr'+'ipt src="js/common.js'+window.__CB+'"><\/scr'+'ipt>');</script>
  <script>
    document.getElementById('header-container').innerHTML = renderHeader();
    document.getElementById('footer-container').innerHTML = renderFooter();

    const slug = getQueryParam('slug');
    const epSlug = getQueryParam('ep');
    const serverIdx = parseInt(getQueryParam('server')) || 0;
    let plyrInstance = null;
    let hlsInstance = null;

    if (!slug) {
      document.getElementById('watchContent').innerHTML = '<div class="empty-state">Thiếu thông tin phim.</div>';
    } else {
      loadWatch();
    }

    async function loadWatch() {
      const result = await getMovieDetail(slug);
      const movie = result.movie;
      const episodes = result.episodes;
      if (!movie) {
        document.getElementById('watchContent').innerHTML = '<div class="empty-state">Không tải được phim.</div>';
        return;
      }
      const server = episodes[serverIdx] || episodes[0];
      const eps = (server && server.server_data) || [];
      const currentEp = epSlug ? eps.find(e => e.slug === epSlug) : eps[0];
      if (!currentEp) {
        document.getElementById('watchContent').innerHTML = '<div class="empty-state">Không tìm thấy tập phim.</div>';
        return;
      }
      document.title = movie.name + ' - ' + currentEp.name + ' - MiloxZizi Film';
      saveHistory(movie, currentEp);
      const currentIdx = eps.findIndex(e => e.slug === currentEp.slug);
      const nextEp = currentIdx < eps.length - 1 ? eps[currentIdx + 1] : null;
      const prevEp = currentIdx > 0 ? eps[currentIdx - 1] : null;
      const nextEpUrl = nextEp ? 'watch.html?slug=' + slug + '&ep=' + encodeURIComponent(nextEp.slug) + '&server=' + serverIdx : null;

      const prevBtn = prevEp ? '<button onclick="location.href=\'watch.html?slug=' + slug + '&ep=' + encodeURIComponent(prevEp.slug) + '&server=' + serverIdx + '\'">⏮ Tập trước</button>' : '';
      const nextBtn = nextEp ? '<button onclick="location.href=\'watch.html?slug=' + slug + '&ep=' + encodeURIComponent(nextEp.slug) + '&server=' + serverIdx + '\'">Tập sau ⏭</button>' : '';

      document.getElementById('watchContent').innerHTML =
        '<div class="player-container">' +
          '<video id="videoPlayer" playsinline controls></video>' +
          // Overlay này CHỈ để display indicator, KHÔNG bắt click
          '<div class="seek-overlay">' +
            '<div class="seek-zone-display">' +
              '<div class="seek-indicator" id="rewindIndicator">' +
                '<div class="arrows">◄◄</div><div class="number">10</div>' +
              '</div>' +
            '</div>' +
            '<div class="seek-zone-display center"></div>' +
            '<div class="seek-zone-display">' +
              '<div class="seek-indicator" id="forwardIndicator">' +
                '<div class="arrows">►►</div><div class="number">10</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div class="video-info-bar">' +
            '<div class="title-group">' +
              '<h1>' + movie.name + '</h1>' +
              '<div class="ep">Đang xem: <strong>' + currentEp.name + '</strong></div>' +
            '</div>' +
            '<div class="quick-actions">' +
              prevBtn +
              nextBtn +
              '<button onclick="location.href=\'movie.html?slug=' + slug + '\'">ⓘ Chi tiết</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
        renderEpisodes(episodes, currentEp.slug, serverIdx);

      initPlyrPlayer(currentEp.link_m3u8, nextEpUrl);
      bindServerTabs();
    }

    /* Seek controls: chỉ listen events trên VIDEO element (sau khi Plyr init xong) */
    function setupSeekOnPlyrReady() {
      // Plyr wraps video trong .plyr container - listen events ở đây
      const plyrEl = document.querySelector('.plyr');
      const video = document.getElementById('videoPlayer');
      if (!plyrEl || !video) return;

      // Double-click trên desktop (chuột)
      plyrEl.addEventListener('dblclick', (e) => {
        // Bỏ qua nếu click vào controls
        if (e.target.closest('.plyr__controls')) return;
        const rect = plyrEl.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const halfX = rect.width / 2;
        const margin = rect.width * 0.15; // 15% giữa = no-action zone

        if (x < halfX - margin) {
          e.preventDefault(); e.stopPropagation();
          doSeek('rewind', video);
        } else if (x > halfX + margin) {
          e.preventDefault(); e.stopPropagation();
          doSeek('forward', video);
        }
      });

      // Double-tap trên touch device
      let lastTap = { time: 0, x: 0 };
      plyrEl.addEventListener('touchend', (e) => {
        if (e.target.closest('.plyr__controls')) return;
        if (e.changedTouches.length === 0) return;
        const touch = e.changedTouches[0];
        const rect = plyrEl.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const now = Date.now();
        // Double-tap detected
        if (now - lastTap.time < 350 && Math.abs(x - lastTap.x) < 80) {
          const halfX = rect.width / 2;
          const margin = rect.width * 0.15;
          if (x < halfX - margin) {
            e.preventDefault(); e.stopPropagation();
            doSeek('rewind', video);
            lastTap = { time: 0, x: 0 };
            return;
          } else if (x > halfX + margin) {
            e.preventDefault(); e.stopPropagation();
            doSeek('forward', video);
            lastTap = { time: 0, x: 0 };
            return;
          }
        }
        lastTap = { time: now, x: x };
      }, { passive: false });

      // Click nút Plyr ⏪ ⏩
      setTimeout(() => {
        const rewindBtn = document.querySelector('[data-plyr="rewind"]');
        const forwardBtn = document.querySelector('[data-plyr="fast-forward"]');
        if (rewindBtn) rewindBtn.addEventListener('click', () => showIndicator('rewindIndicator'));
        if (forwardBtn) forwardBtn.addEventListener('click', () => showIndicator('forwardIndicator'));
      }, 200);

      // Keyboard J/L
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        const key = e.key.toLowerCase();
        if (key === 'j' || key === 'arrowleft') showIndicator('rewindIndicator');
        else if (key === 'l' || key === 'arrowright') showIndicator('forwardIndicator');
      });
    }

    function doSeek(action, video) {
      if (!video) return;
      if (action === 'rewind') {
        video.currentTime = Math.max(0, video.currentTime - 10);
        showIndicator('rewindIndicator');
      } else if (action === 'forward') {
        video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
        showIndicator('forwardIndicator');
      }
    }

    function showIndicator(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.remove('show');
      void el.offsetWidth;
      el.classList.add('show');
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.remove('show'), 700);
    }

    function initPlyrPlayer(m3u8Url, nextEpUrl) {
      const video = document.getElementById('videoPlayer');
      if (!m3u8Url) {
        document.querySelector('.player-container').innerHTML = '<div class="empty-state" style="background:#000;padding:80px 20px;border-radius:12px;">Tập này chưa có link xem.</div>';
        return;
      }
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = m3u8Url;
        plyrInstance = new Plyr(video, getPlyrConfig());
        plyrInstance.on('ready', () => setupSeekOnPlyrReady());
        if (nextEpUrl) plyrInstance.on('ended', () => { window.location.href = nextEpUrl; });
        return;
      }
      if (!Hls.isSupported()) {
        document.querySelector('.player-container').innerHTML = '<div class="empty-state" style="background:#000;padding:80px 20px;border-radius:12px;">Trình duyệt không hỗ trợ HLS.</div>';
        return;
      }
      hlsInstance = new Hls({ capLevelToPlayerSize: false, startLevel: -1 });
      hlsInstance.loadSource(m3u8Url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        const availableQualities = hlsInstance.levels.map(l => l.height).filter(h => h > 0).sort((a, b) => b - a);
        const uniqueQualities = [...new Set(availableQualities)];
        const qualities = uniqueQualities.length > 1 ? [0].concat(uniqueQualities) : uniqueQualities;
        const config = getPlyrConfig();
        if (qualities.length > 1) {
          config.quality = {
            default: 0, options: qualities, forced: true,
            onChange: (newQuality) => {
              if (newQuality === 0) { hlsInstance.currentLevel = -1; }
              else {
                hlsInstance.levels.forEach((level, idx) => {
                  if (level.height === newQuality) hlsInstance.currentLevel = idx;
                });
              }
            }
          };
          config.i18n = Object.assign(config.i18n || {}, { qualityLabel: { 0: 'Auto' } });
          config.settings = ['quality', 'speed'];
        } else {
          config.settings = ['speed'];
        }
        plyrInstance = new Plyr(video, config);
        plyrInstance.on('ready', () => setupSeekOnPlyrReady());
        if (nextEpUrl) plyrInstance.on('ended', () => { window.location.href = nextEpUrl; });
      });
      hlsInstance.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          switch (data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR: hlsInstance.startLoad(); break;
            case Hls.ErrorTypes.MEDIA_ERROR: hlsInstance.recoverMediaError(); break;
            default:
              document.querySelector('.player-container').innerHTML = '<div class="empty-state" style="background:#000;padding:80px 20px;border-radius:12px;">Không phát được video. Link có thể đã hết hạn.</div>';
          }
        }
      });
    }

    function getPlyrConfig() {
      return {
        controls: ['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
        settings: ['quality', 'speed'],
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
        seekTime: 10,
        clickToPlay: true,
        keyboard: { focused: true, global: true },
        tooltips: { controls: true, seek: true },
        i18n: {
          restart: 'Phát lại', rewind: 'Lùi 10s', play: 'Phát', pause: 'Tạm dừng',
          fastForward: 'Tiến 10s', seek: 'Tua', played: 'Đã xem', buffered: 'Đã tải',
          currentTime: 'Hiện tại', duration: 'Tổng thời lượng', volume: 'Âm lượng',
          mute: 'Tắt tiếng', unmute: 'Bật tiếng', download: 'Tải xuống',
          enterFullscreen: 'Toàn màn hình', exitFullscreen: 'Thoát toàn màn hình',
          settings: 'Cài đặt', pip: 'PIP', menuBack: 'Quay lại',
          speed: 'Tốc độ', normal: 'Bình thường', quality: 'Chất lượng', loop: 'Lặp lại'
        }
      };
    }

    function renderEpisodes(episodes, currentEpSlug, currentServerIdx) {
      if (!episodes || episodes.length === 0) return '';
      const tabs = episodes.map((server, idx) =>
        '<button class="server-tab ' + (idx === currentServerIdx ? 'active' : '') + '" data-idx="' + idx + '">' + server.server_name + '</button>'
      ).join('');
      const lists = episodes.map((server, idx) => {
        const epsHtml = (server.server_data || []).map(ep =>
          '<a href="watch.html?slug=' + slug + '&ep=' + encodeURIComponent(ep.slug) + '&server=' + idx + '" class="episode-btn ' + (ep.slug === currentEpSlug ? 'active' : '') + '">' + ep.name + '</a>'
        ).join('');
        return '<div class="episode-list" data-idx="' + idx + '" style="' + (idx === currentServerIdx ? '' : 'display:none') + '">' + epsHtml + '</div>';
      }).join('');
      return '<div class="episodes-section"><h2 class="section-title" style="margin-top:0;">Danh sách tập</h2><div class="server-tabs">' + tabs + '</div>' + lists + '</div>';
    }

    function bindServerTabs() {
      document.querySelectorAll('.server-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const idx = tab.dataset.idx;
          document.querySelectorAll('.server-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.querySelectorAll('.episode-list').forEach(list => {
            list.style.display = list.dataset.idx === idx ? '' : 'none';
          });
        });
      });
    }
  </script>
</body>
</html>
