<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiloxZizi Film - Xem phim online miễn phí</title>
  <meta name="description" content="Xem phim online chất lượng cao, miễn phí, đa thể loại" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header-container"></div>

  <div id="heroContainer"></div>

  <main>
    <h2 class="section-title">🔥 Phim mới cập nhật</h2>
    <div id="movieList" class="movie-grid"></div>

    <div id="pagination" class="pagination"></div>
  </main>

  <div id="footer-container"></div>

  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/common.js"></script>
  <script>
    document.getElementById('header-container').innerHTML = renderHeader('home');
    document.getElementById('footer-container').innerHTML = renderFooter();

    let currentPage = parseInt(getQueryParam('page')) || 1;

    async function loadPage(page) {
      currentPage = page;
      showSkeleton('movieList');
      document.getElementById('pagination').innerHTML = '';

      // Trang 1: load hero banner + phim mới
      if (page === 1) {
        document.getElementById('heroContainer').innerHTML = '<div class="hero-skeleton"></div>';
      }

      const { items, pagination } = await getNewMovies(page);

      // Render hero banner ở trang 1
      if (page === 1 && items.length > 0) {
        document.getElementById('heroContainer').innerHTML = renderHeroBanner(items);
        initHeroSlider();
      } else {
        document.getElementById('heroContainer').innerHTML = '';
      }

      hideSkeleton('movieList');
      renderMovieList(items, 'movieList');
      renderPagination(pagination, loadPage, 'pagination');
    }

    loadPage(currentPage);
  </script>
</body>
</html>
