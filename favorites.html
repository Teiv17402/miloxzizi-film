<!DOCTYPE html>
<html lang="vi">
<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phim yêu thích - MiloxZizi Film</title>
  <link rel="stylesheet" href="css/style.css?v=20260514r28"/>
</head>
<body>
  <div id="header-container"></div>

  <main>
    <div class="server-tabs" style="margin-bottom: 24px;">
      <button class="server-tab active" data-tab="favorites">★ Yêu thích</button>
      <button class="server-tab" data-tab="history">🕒 Lịch sử xem</button>
    </div>

    <div id="favoritesView">
      <h2 class="section-title">Phim bạn yêu thích</h2>
      <div id="favoritesList" class="movie-grid"></div>
    </div>

    <div id="historyView" style="display:none;">
      <h2 class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
        Lịch sử xem
        <button class="btn btn-secondary" id="clearHistoryBtn" style="font-size:13px;">Xoá tất cả</button>
      </h2>
      <div id="historyList" class="movie-grid"></div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="js/api.js?v=20260514r28"></script>
  <script src="js/storage.js?v=20260514r28"></script>
  <script src="js/common.js?v=20260514r28"></script>
  <script>
    try {
      document.getElementById('header-container').innerHTML = renderHeader('favorites');
      document.getElementById('footer-container').innerHTML = renderFooter();
    } catch (e) {
      console.error('Header/Footer error:', e);
    }

    // Tab switching
    document.querySelectorAll('.server-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.server-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const view = tab.dataset.tab;
        document.getElementById('favoritesView').style.display = view === 'favorites' ? '' : 'none';
        document.getElementById('historyView').style.display = view === 'history' ? '' : 'none';
      });
    });

    function renderFavorites() {
      const container = document.getElementById('favoritesList');
      if (!container) {
        console.error('favoritesList container not found!');
        return;
      }

      let favs = [];
      try {
        favs = getFavorites();
        console.log('[Favorites] Loaded', favs.length, 'items');
      } catch (e) {
        console.error('[Favorites] getFavorites error:', e);
        container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">Lỗi đọc dữ liệu: ' + e.message + '</div>';
        return;
      }

      if (!Array.isArray(favs) || favs.length === 0) {
        container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">Bạn chưa có phim yêu thích nào.<br/>Vào trang phim và nhấn <strong>★ Yêu thích</strong> để thêm.</div>';
        return;
      }

      // Render từng card thủ công - tránh template literal phức tạp
      container.innerHTML = '';
      favs.forEach(m => {
        const slug = (m && m.slug) ? m.slug : '';
        const name = (m && m.name) ? m.name : '(không tên)';
        const originName = (m && m.origin_name) ? m.origin_name : '';
        const year = (m && m.year) ? m.year : '';
        let poster = '';
        try { poster = getPosterUrl(m) || ''; } catch (e) { poster = ''; }

        const card = document.createElement('div');
        card.className = 'movie-card fade-in';
        card.style.position = 'relative';
        card.style.opacity = '1';
        card.style.transform = 'none';

        const link = document.createElement('a');
        link.href = 'movie.html?slug=' + slug;

        const posterDiv = document.createElement('div');
        posterDiv.className = 'poster';
        const img = document.createElement('img');
        img.src = poster;
        img.alt = name;
        img.loading = 'lazy';
        img.onerror = function() { this.style.background = '#222'; this.style.minHeight = '270px'; this.src = ''; };
        posterDiv.appendChild(img);
        link.appendChild(posterDiv);

        const info = document.createElement('div');
        info.className = 'info';
        const nameDiv = document.createElement('div');
        nameDiv.className = 'name';
        nameDiv.textContent = name;
        const origDiv = document.createElement('div');
        origDiv.className = 'origin-name';
        origDiv.textContent = (originName ? originName : '') + (year ? ' • ' + year : '');
        info.appendChild(nameDiv);
        info.appendChild(origDiv);
        link.appendChild(info);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'btn btn-secondary remove-fav';
        removeBtn.dataset.slug = slug;
        removeBtn.textContent = '✕';
        removeBtn.style.cssText = 'position:absolute;top:8px;right:8px;padding:4px 10px;font-size:12px;';
        removeBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          removeFavorite(slug);
          renderFavorites();
        });

        card.appendChild(link);
        card.appendChild(removeBtn);
        container.appendChild(card);
      });
      console.log('[Favorites] Rendered', favs.length, 'cards');
    }

    function renderHistory() {
      const container = document.getElementById('historyList');
      if (!container) return;

      let history = [];
      try {
        history = getHistory();
        console.log('[History] Loaded', history.length, 'items');
      } catch (e) {
        console.error('[History] error:', e);
        return;
      }

      if (!Array.isArray(history) || history.length === 0) {
        container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">Bạn chưa xem phim nào.</div>';
        return;
      }

      container.innerHTML = '';
      history.forEach(m => {
        const slug = (m && m.slug) ? m.slug : '';
        const name = (m && m.name) ? m.name : '(không tên)';
        const epName = (m && m.episodeName) ? m.episodeName : 'Tập 1';
        const epSlug = (m && m.episodeSlug) ? m.episodeSlug : '';
        const watchedAt = m && m.watchedAt ? new Date(m.watchedAt).toLocaleString('vi-VN') : '';
        let poster = '';
        try { poster = getPosterUrl(m) || ''; } catch (e) { poster = ''; }

        const card = document.createElement('div');
        card.className = 'movie-card fade-in';
        card.style.position = 'relative';
        card.style.opacity = '1';
        card.style.transform = 'none';

        const link = document.createElement('a');
        link.href = 'watch.html?slug=' + slug + '&ep=' + encodeURIComponent(epSlug);

        const posterDiv = document.createElement('div');
        posterDiv.className = 'poster';
        const img = document.createElement('img');
        img.src = poster;
        img.alt = name;
        img.loading = 'lazy';
        posterDiv.appendChild(img);

        const badges = document.createElement('div');
        badges.className = 'badges';
        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = epName;
        badges.appendChild(badge);
        posterDiv.appendChild(badges);

        link.appendChild(posterDiv);

        const info = document.createElement('div');
        info.className = 'info';
        const nameDiv = document.createElement('div');
        nameDiv.className = 'name';
        nameDiv.textContent = name;
        const timeDiv = document.createElement('div');
        timeDiv.className = 'origin-name';
        timeDiv.textContent = watchedAt;
        info.appendChild(nameDiv);
        info.appendChild(timeDiv);
        link.appendChild(info);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'btn btn-secondary remove-history';
        removeBtn.dataset.slug = slug;
        removeBtn.textContent = '✕';
        removeBtn.style.cssText = 'position:absolute;top:8px;right:8px;padding:4px 10px;font-size:12px;';
        removeBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          removeFromHistory(slug);
          renderHistory();
        });

        card.appendChild(link);
        card.appendChild(removeBtn);
        container.appendChild(card);
      });
      console.log('[History] Rendered', history.length, 'cards');
    }

    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
      if (confirm('Xoá toàn bộ lịch sử xem?')) {
        clearHistory();
        renderHistory();
      }
    });

    // Initial render
    console.log('[FavoritesPage] Script loaded');
    console.log('[FavoritesPage] Raw favorites:', localStorage.getItem('phim_favorites'));
    console.log('[FavoritesPage] Raw history:', localStorage.getItem('phim_history'));
    renderFavorites();
    renderHistory();
  </script>
</body>
</html>
